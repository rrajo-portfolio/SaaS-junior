apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: fiscal-saas
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app.kubernetes.io/name: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: fiscal-saas
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: fiscal-saas
    spec:
      securityContext:
        fsGroup: 65534
      containers:
        - name: backend
          image: fiscal-saas-backend:preprod
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: fiscal-saas-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: fiscal-saas-runtime
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fiscal-saas-runtime
                  key: SPRING_DATASOURCE_PASSWORD
            - name: APP_CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: fiscal-saas-config
                  key: APP_CORS_ALLOWED_ORIGINS
            - name: VERIFACTU_MODE
              valueFrom:
                configMapKeyRef:
                  name: fiscal-saas-config
                  key: VERIFACTU_MODE
            - name: AEAT_PRODUCTION_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: fiscal-saas-config
                  key: AEAT_PRODUCTION_ENABLED
            - name: APP_DOCUMENT_STORAGE_PATH
              value: /app/storage/documents
          volumeMounts:
            - name: document-storage
              mountPath: /app/storage/documents
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 35
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: document-storage
          emptyDir: {}
