name: fiscal-saas-keycloak

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.7
    command:
      - start-dev
      - --import-realm
    env_file:
      - ../../.env
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_PORT: "8080"
    ports:
      - "18081:8080"
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - keycloak-data:/opt/keycloak/data

volumes:
  keycloak-data:
