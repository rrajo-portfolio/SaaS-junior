worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;
  client_max_body_size 25m;

  map $http_authorization $skip_cache {
    default 1;
    "" 0;
  }

  proxy_cache_path /var/cache/nginx/fiscal_static levels=1:2 keys_zone=fiscal_static:50m max_size=256m inactive=60m use_temp_path=off;

  upstream fiscal_backend {
    server backend:8080;
  }

  upstream fiscal_frontend {
    server frontend:80;
  }

  server {
    listen 8080;
    server_name _;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    location = /healthz {
      access_log off;
      add_header Cache-Control "no-store" always;
      return 200 "ok\n";
    }

    location /api/auth/ {
      proxy_pass http://fiscal_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
      proxy_hide_header Cache-Control;
      add_header Cache-Control "no-store" always;
    }

    location ~ ^/api/(documents|fiscal|verifactu|einvoice)/ {
      proxy_pass http://fiscal_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
      proxy_hide_header Cache-Control;
      add_header Cache-Control "no-store" always;
    }

    location /api/ {
      proxy_pass http://fiscal_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
      proxy_hide_header Cache-Control;
      add_header Cache-Control "no-store" always;
    }

    location /actuator/health {
      proxy_pass http://fiscal_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_hide_header Cache-Control;
      add_header Cache-Control "no-store" always;
    }

    location = /actuator/prometheus {
      proxy_pass http://fiscal_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_hide_header Cache-Control;
      add_header Cache-Control "no-store" always;
    }

    location ~* "^/assets/.+-[A-Za-z0-9_-]{8,}\.(css|js|mjs|png|jpg|jpeg|gif|svg|webp|ico|woff|woff2)$" {
      proxy_pass http://fiscal_frontend;
      proxy_cache fiscal_static;
      proxy_cache_valid 200 30d;
      proxy_cache_bypass $skip_cache;
      proxy_no_cache $skip_cache;
      proxy_hide_header Cache-Control;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
      add_header X-Cache-Status $upstream_cache_status always;
    }

    location /assets/ {
      proxy_pass http://fiscal_frontend;
      proxy_hide_header Cache-Control;
      add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location / {
      proxy_pass http://fiscal_frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_hide_header Cache-Control;
      add_header Cache-Control "no-cache, must-revalidate" always;
    }
  }
}
