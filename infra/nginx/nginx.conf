worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;
  client_max_body_size 25m;

  proxy_cache_path /var/cache/nginx/fiscal_static levels=1:2 keys_zone=fiscal_static:50m max_size=256m inactive=60m use_temp_path=off;

  upstream fiscal_backend {
    server backend:8080;
  }

  upstream fiscal_frontend {
    server frontend:80;
  }

  server {
    listen 8080;
    server_name _;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /healthz {
      access_log off;
      add_header Cache-Control "no-store" always;
      return 200 "ok\n";
    }

    location /api/auth/ {
      proxy_pass http://fiscal_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      add_header Cache-Control "no-store" always;
    }

    location ~ ^/api/(documents|fiscal|verifactu|einvoice)/ {
      proxy_pass http://fiscal_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      add_header Cache-Control "no-store" always;
    }

    location /api/ {
      proxy_pass http://fiscal_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      add_header Cache-Control "no-store" always;
    }

    location /actuator/health {
      proxy_pass http://fiscal_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      add_header Cache-Control "no-store" always;
    }

    location /assets/ {
      proxy_pass http://fiscal_frontend;
      proxy_cache fiscal_static;
      proxy_cache_valid 200 30d;
      proxy_cache_bypass $http_authorization;
      add_header Cache-Control "public, max-age=31536000, immutable" always;
      add_header X-Cache-Status $upstream_cache_status always;
    }

    location / {
      proxy_pass http://fiscal_frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      add_header Cache-Control "no-cache, must-revalidate" always;
    }
  }
}

