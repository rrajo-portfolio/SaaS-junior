name: fiscal-saas-preprod

services:
  mysql:
    image: mysql:8.4
    env_file:
      - ../../.env
    ports:
      - "3306:3306"
    volumes:
      - mysql-preprod:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    env_file:
      - ../../.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fiscal_saas
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173
      VERIFACTU_MODE: stub
      AEAT_PRODUCTION_ENABLED: "false"
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 18

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8082:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  nginx:
    build:
      context: ../..
      dockerfile: infra/docker/nginx.Dockerfile
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  mysql-preprod:
