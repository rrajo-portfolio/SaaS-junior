name: fiscal-saas-preprod

services:
  mysql:
    image: mysql:8.4
    env_file:
      - ../../.env
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-preprod:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    env_file:
      - ../../.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fiscal_saas
      APP_CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173
      APP_SECURITY_AUTH_MODE: ${APP_SECURITY_AUTH_MODE:-demo}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:-http://keycloak:8080/realms/fiscal-saas}
      VERIFACTU_MODE: stub
      AEAT_PRODUCTION_ENABLED: "false"
      APP_DOCUMENT_STORAGE_PATH: /app/storage/documents
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - document-storage-preprod:/app/storage/documents
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 18

  frontend:
    build:
      context: ../..
      dockerfile: infra/docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_LOGIN_MODE: ${VITE_LOGIN_MODE:-demo}
        VITE_OIDC_AUTHORITY: ${VITE_OIDC_AUTHORITY:-http://localhost:18081/realms/fiscal-saas}
        VITE_OIDC_CLIENT_ID: ${VITE_OIDC_CLIENT_ID:-fiscal-saas-frontend}
        VITE_OIDC_REDIRECT_URI: ${VITE_OIDC_REDIRECT_URI:-http://127.0.0.1:18080}
        VITE_OIDC_POST_LOGOUT_REDIRECT_URI: ${VITE_OIDC_POST_LOGOUT_REDIRECT_URI:-http://127.0.0.1:18080}
        VITE_OIDC_SCOPE: ${VITE_OIDC_SCOPE:-openid profile email}
        VITE_APP_ENV: ${VITE_APP_ENV:-LOCAL_PREPROD}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-local-build}
        VITE_LAST_SMOKE_TEST_AT: ${VITE_LAST_SMOKE_TEST_AT:-not-recorded}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8082:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  nginx:
    build:
      context: ../..
      dockerfile: infra/docker/nginx.Dockerfile
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  mysql-preprod:
  document-storage-preprod:
