name: fiscal-saas-local

services:
  mysql:
    image: mysql:8.4
    env_file:
      - ../../.env
    ports:
      - "3306:3306"
    volumes:
      - mysql-local:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    env_file:
      - ../../.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fiscal_saas
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      APP_DOCUMENT_STORAGE_PATH: /app/storage/documents
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - document-storage-local:/app/storage/documents
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 18

volumes:
  mysql-local:
  document-storage-local:
