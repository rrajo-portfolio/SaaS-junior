jenkins:
  systemMessage: "Fiscal SaaS CI/CD controller managed by Jenkins Configuration as Code."
  numExecutors: 2
  mode: NORMAL
  scmCheckoutRetryCount: 2
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_ID}"
          password: "${JENKINS_ADMIN_PASSWORD}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false
  remotingSecurity:
    enabled: true

unclassified:
  location:
    url: "${JENKINS_URL}"

jobs:
  - script: |
      def repoBranch = System.getenv('JENKINS_REPO_BRANCH') ?: 'main'
      if (!repoBranch.startsWith('*/')) {
        repoBranch = '*/' + repoBranch
      }

      folder('fiscal-saas') {
        description('Fiscal SaaS generated jobs.')
      }

      pipelineJob('fiscal-saas/main') {
        description('Fiscal SaaS main pipeline generated by JCasC. No production deploys.')
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url(System.getenv('JENKINS_REPO_URL') ?: 'https://github.com/rrajo-portfolio/SaaS-junior.git')
                }
                branches(repoBranch)
              }
            }
            scriptPath('infra/jenkins/Jenkinsfile')
          }
        }
      }
