spring:
  application:
    name: fiscal-saas-backend
  servlet:
    multipart:
      max-file-size: ${APP_DOCUMENT_MAX_FILE_SIZE:25MB}
      max-request-size: ${APP_DOCUMENT_MAX_REQUEST_SIZE:25MB}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fiscal_saas}
    username: ${SPRING_DATASOURCE_USERNAME:fiscal_saas}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  documents:
    storage-path: ${APP_DOCUMENT_STORAGE_PATH:./var/document-storage}
