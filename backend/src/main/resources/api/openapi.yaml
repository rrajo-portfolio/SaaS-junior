openapi: 3.1.0
info:
  title: Fiscal SaaS API
  version: 0.1.0
paths:
  /api/health:
    get:
      operationId: getApiHealth
      summary: Backend health check
      responses:
        "200":
          description: Backend is reachable
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - service
                  - checkedAt
                properties:
                  status:
                    type: string
                    enum:
                      - ok
                  service:
                    type: string
                  checkedAt:
                    type: string
                    format: date-time
  /api/me:
    get:
      operationId: getCurrentUser
      summary: Current authenticated user and memberships
      parameters:
        - $ref: "#/components/parameters/UserEmail"
      responses:
        "200":
          description: Current user context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Missing or invalid identity header
  /api/tenants:
    get:
      operationId: listCurrentUserTenants
      summary: Tenants available to the current user
      parameters:
        - $ref: "#/components/parameters/UserEmail"
      responses:
        "200":
          description: Tenant memberships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tenant"
        "401":
          description: Missing or invalid identity header
  /api/tenants/{tenantId}/companies:
    get:
      operationId: listTenantCompanies
      summary: Companies scoped to a tenant membership
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/UserEmail"
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Tenant companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
        "401":
          description: Missing or invalid identity header
        "403":
          description: User is not a member of the requested tenant
    post:
      operationId: createTenantCompany
      summary: Create a tenant company, client or supplier
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/UserEmail"
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyRequest"
      responses:
        "201":
          description: Company created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "400":
          description: Validation failed
        "403":
          description: Current role cannot mutate tenant data
        "409":
          description: Company tax identifier already exists in tenant
  /api/tenants/{tenantId}/companies/{companyId}:
    get:
      operationId: getTenantCompany
      summary: Read a tenant company by id
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/UserEmail"
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Company details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Company not found in tenant
    patch:
      operationId: updateTenantCompany
      summary: Update a tenant company
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/UserEmail"
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCompanyRequest"
      responses:
        "200":
          description: Company updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "400":
          description: Validation failed
        "403":
          description: Current role cannot mutate tenant data
        "404":
          description: Company not found in tenant
        "409":
          description: Company tax identifier already exists in tenant
    delete:
      operationId: deactivateTenantCompany
      summary: Deactivate a tenant company without deleting fiscal history
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: companyId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/UserEmail"
        - $ref: "#/components/parameters/TenantId"
      responses:
        "204":
          description: Company deactivated
        "404":
          description: Company not found in tenant
  /api/tenants/{tenantId}/business-relationships:
    get:
      operationId: listTenantBusinessRelationships
      summary: Business relationships scoped to a tenant
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/UserEmail"
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Tenant business relationships
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BusinessRelationship"
    post:
      operationId: createTenantBusinessRelationship
      summary: Create a relationship between two tenant companies
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/UserEmail"
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBusinessRelationshipRequest"
      responses:
        "201":
          description: Business relationship created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessRelationship"
        "400":
          description: Validation failed
        "403":
          description: Current role cannot mutate tenant data
        "404":
          description: Company not found in tenant
        "409":
          description: Relationship already exists in tenant
  /api/tenants/{tenantId}/business-relationships/{relationshipId}:
    patch:
      operationId: updateTenantBusinessRelationship
      summary: Update a tenant business relationship
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: relationshipId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/UserEmail"
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBusinessRelationshipRequest"
      responses:
        "200":
          description: Business relationship updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessRelationship"
        "404":
          description: Relationship not found in tenant
    delete:
      operationId: deactivateTenantBusinessRelationship
      summary: Deactivate a tenant business relationship
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: relationshipId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/UserEmail"
        - $ref: "#/components/parameters/TenantId"
      responses:
        "204":
          description: Business relationship deactivated
        "404":
          description: Relationship not found in tenant
  /api/tenants/{tenantId}/documents:
    get:
      operationId: listTenantDocuments
      summary: Fiscal documents scoped to a tenant
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/UserEmail"
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Tenant documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: uploadTenantDocument
      summary: Upload a new fiscal document with version 1
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/UserEmail"
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - companyId
                - documentType
                - file
              properties:
                companyId:
                  type: string
                  format: uuid
                documentType:
                  $ref: "#/components/schemas/DocumentType"
                title:
                  type: string
                  maxLength: 220
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "403":
          description: Current role cannot mutate tenant documents
  /api/tenants/{tenantId}/documents/{documentId}/versions:
    post:
      operationId: uploadTenantDocumentVersion
      summary: Upload a new immutable version of a fiscal document
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/UserEmail"
        - $ref: "#/components/parameters/TenantId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Document version uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
  /api/tenants/{tenantId}/documents/{documentId}/download:
    get:
      operationId: downloadTenantDocument
      summary: Download the latest fiscal document version
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/UserEmail"
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Latest document binary. Response must be no-store.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
  /api/tenants/{tenantId}/documents/{documentId}/events:
    get:
      operationId: listTenantDocumentEvents
      summary: Append-only audit events for a fiscal document
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/UserEmail"
        - $ref: "#/components/parameters/TenantId"
      responses:
        "200":
          description: Document audit events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentEvent"
components:
  parameters:
    UserEmail:
      name: X-User-Email
      in: header
      required: true
      schema:
        type: string
        format: email
    TenantId:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    MeResponse:
      type: object
      required:
        - user
        - memberships
      properties:
        user:
          type: object
          required:
            - id
            - email
            - displayName
            - roles
          properties:
            id:
              type: string
              format: uuid
            email:
              type: string
              format: email
            displayName:
              type: string
            roles:
              type: array
              items:
                $ref: "#/components/schemas/Role"
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/Membership"
    Membership:
      type: object
      required:
        - tenantId
        - tenantSlug
        - tenantName
        - role
      properties:
        tenantId:
          type: string
          format: uuid
        tenantSlug:
          type: string
        tenantName:
          type: string
        role:
          $ref: "#/components/schemas/Role"
    Tenant:
      type: object
      required:
        - id
        - slug
        - name
        - role
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        name:
          type: string
        role:
          $ref: "#/components/schemas/Role"
    Company:
      type: object
      required:
        - id
        - tenantId
        - legalName
        - taxId
        - countryCode
        - relationshipType
        - status
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        legalName:
          type: string
        taxId:
          type: string
        countryCode:
          type: string
        relationshipType:
          type: string
        status:
          type: string
    CreateCompanyRequest:
      type: object
      required:
        - legalName
        - taxId
        - countryCode
        - relationshipType
      properties:
        legalName:
          type: string
          maxLength: 220
        taxId:
          type: string
          maxLength: 40
          description: Basic NIF/NIE/CIF or VAT-like identifier. Real compliance is not asserted.
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
        relationshipType:
          $ref: "#/components/schemas/CompanyRelationshipType"
    UpdateCompanyRequest:
      type: object
      properties:
        legalName:
          type: string
          maxLength: 220
        taxId:
          type: string
          maxLength: 40
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
        relationshipType:
          $ref: "#/components/schemas/CompanyRelationshipType"
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
    BusinessRelationship:
      type: object
      required:
        - id
        - tenantId
        - sourceCompany
        - targetCompany
        - relationshipKind
        - status
        - startsAt
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        sourceCompany:
          $ref: "#/components/schemas/Company"
        targetCompany:
          $ref: "#/components/schemas/Company"
        relationshipKind:
          $ref: "#/components/schemas/BusinessRelationshipKind"
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
        notes:
          type: string
          maxLength: 500
        startsAt:
          type: string
          format: date
    CreateBusinessRelationshipRequest:
      type: object
      required:
        - sourceCompanyId
        - targetCompanyId
        - relationshipKind
      properties:
        sourceCompanyId:
          type: string
          format: uuid
        targetCompanyId:
          type: string
          format: uuid
        relationshipKind:
          $ref: "#/components/schemas/BusinessRelationshipKind"
        notes:
          type: string
          maxLength: 500
    UpdateBusinessRelationshipRequest:
      type: object
      properties:
        relationshipKind:
          $ref: "#/components/schemas/BusinessRelationshipKind"
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
        notes:
          type: string
          maxLength: 500
    CompanyRelationshipType:
      type: string
      enum:
        - OWNER
        - CLIENT
        - SUPPLIER
    BusinessRelationshipKind:
      type: string
      enum:
        - CLIENT_MANAGEMENT
        - SUPPLIER_PORTAL
        - GROUP_COMPANY
        - ADVISORY
        - DOCUMENT_EXCHANGE
    Document:
      type: object
      required:
        - id
        - tenantId
        - company
        - documentType
        - title
        - status
        - currentVersion
        - latestSha256
        - latestByteSize
        - latestFilename
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        company:
          $ref: "#/components/schemas/Company"
        documentType:
          $ref: "#/components/schemas/DocumentType"
        title:
          type: string
        status:
          type: string
        currentVersion:
          type: integer
        latestSha256:
          type: string
          minLength: 64
          maxLength: 64
        latestByteSize:
          type: integer
          format: int64
        latestFilename:
          type: string
        updatedAt:
          type: string
          format: date-time
    DocumentEvent:
      type: object
      required:
        - eventType
        - eventAt
      properties:
        eventType:
          type: string
        eventAt:
          type: string
          format: date-time
        details:
          type: string
    DocumentType:
      type: string
      enum:
        - INVOICE_ISSUED
        - INVOICE_RECEIVED
        - CONTRACT
        - CERTIFICATE
        - TAX_REPORT
        - EVIDENCE
        - OTHER
    Role:
      type: string
      enum:
        - platform_admin
        - tenant_admin
        - fiscal_manager
        - accountant
        - client_user
        - auditor
        - readonly
